core:
  message: Hello from local Config Server

spring:
  datasource:
    url: ${CORE_DB_URL:jdbc:postgresql://localhost:54322/core_db}
    username: ${CORE_DB_USERNAME:core}
    password: ${CORE_DB_PASSWORD:core_local_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

outbox:
  scheduler:
    enabled: false
  polling-delay-ms: 1000
  batch-size: 100
  max-retries: 5
  lock-timeout-seconds: 60