apiVersion: apps/v1
kind: Deployment
metadata:
  name: member-service
  namespace: app
  labels:
    app: member-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: member-service
  template:
    metadata:
      labels:
        app: member-service
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: member-service
          image: ghcr.io/prgrms-be-adv-devcourse/lastdish-member-service:dev
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: CONFIG_SERVER_URL
              value: http://config-server.platform.svc.cluster.local:8888
            - name: MEMBER_DB_URL
              value: jdbc:postgresql://member-db.data.svc.cluster.local:5432/member_db
            - name: MEMBER_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: member-db-credentials
                  key: username
            - name: MEMBER_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: member-db-credentials
                  key: password
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 100
            runAsGroup: 101
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: member-service
  namespace: app
spec:
  type: ClusterIP
  selector:
    app: member-service
  ports:
    - name: http
      port: 80
      targetPort: http
