apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: app
  labels:
    app: gateway-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: gateway-service
          image: ghcr.io/prgrms-be-adv-devcourse/lastdish-gateway-service:dev
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: CONFIG_SERVER_URL
              value: http://config-server.platform.svc.cluster.local:8888
            - name: JWT_PUBLIC_KEY_LOCATION
              value: file:/etc/lastdish/jwt/access-public-key.pem
          volumeMounts:
            - name: access-public-key
              mountPath: /etc/lastdish/jwt
              readOnly: true
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 100
            runAsGroup: 101
            capabilities:
              drop:
                - ALL
      volumes:
        - name: access-public-key
          configMap:
            name: gateway-jwt-public-key
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: app
spec:
  selector:
    app: gateway-service
  ports:
    - name: http
      port: 80
      targetPort: http
