name: Code Quality

on:
  pull_request:
    branches:
      - develop

concurrency:
  group: code-quality-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  spotless-and-build:
    name: Spotless and Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
          cache-dependency-path: backend/**/*.gradle*

      - name: Verify formatting and build
        working-directory: backend
        run: ./gradlew spotlessCheck build --no-daemon
