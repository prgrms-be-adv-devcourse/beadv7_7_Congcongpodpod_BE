name: Gateway Service Image

on:
  pull_request:
    paths:
      - 'backend/services/gateway-service/**'
      - 'backend/modules/**'
      - 'backend/build.gradle'
      - 'backend/settings.gradle'
      - 'backend/gradle.properties'
      - 'backend/gradlew'
      - 'backend/gradlew.bat'
      - 'backend/gradle/**'
      - '.github/workflows/gateway-service-image.yml'
      - '.github/workflows/deploy-service.yml'
  push:
    branches:
      - main
    paths:
      - 'backend/services/gateway-service/**'
      - 'backend/modules/**'
      - 'backend/build.gradle'
      - 'backend/settings.gradle'
      - 'backend/gradle.properties'
      - 'backend/gradlew'
      - 'backend/gradlew.bat'
      - 'backend/gradle/**'
      - '.github/workflows/gateway-service-image.yml'
      - '.github/workflows/deploy-service.yml'
  workflow_dispatch:

concurrency:
  group: gateway-service-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/lastdish-gateway-service

jobs:
  test-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
          cache-dependency-path: backend/**/*.gradle*

      - name: Test Gateway Service
        working-directory: backend
        run: ./gradlew :services:gateway-service:test --no-daemon

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: metadata
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=dev,enable=${{ github.event_name != 'pull_request' }}
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: backend
          file: backend/services/gateway-service/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha,scope=gateway-service
          cache-to: type=gha,mode=max,scope=gateway-service

  deploy:
    needs: test-and-publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/deploy-service.yml
    with:
      deployment: gateway-service
      namespace: app
    secrets:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
      EC2_SSH_KNOWN_HOSTS: ${{ secrets.EC2_SSH_KNOWN_HOSTS }}
