name: Deploy Service

on:
  workflow_call:
    inputs:
      deployment:
        description: Kubernetes Deployment name
        required: true
        type: string
      namespace:
        description: Kubernetes namespace
        required: true
        type: string
    secrets:
      EC2_HOST:
        required: true
      EC2_SSH_PRIVATE_KEY:
        required: true
      EC2_SSH_KNOWN_HOSTS:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.EC2_SSH_KNOWN_HOSTS }}
        run: |
          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/deploy_key"
          printf '%s\n' "$SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/deploy_key" "$HOME/.ssh/known_hosts"

      - name: Restart Kubernetes Deployment
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          DEPLOYMENT: ${{ inputs.deployment }}
          NAMESPACE: ${{ inputs.namespace }}
        run: |
          ssh -i "$HOME/.ssh/deploy_key" \
            -o IdentitiesOnly=yes \
            -o BatchMode=yes \
            ec2-user@"$EC2_HOST" \
            "kubectl rollout restart deployment/$DEPLOYMENT -n $NAMESPACE && kubectl rollout status deployment/$DEPLOYMENT -n $NAMESPACE --timeout=180s"
