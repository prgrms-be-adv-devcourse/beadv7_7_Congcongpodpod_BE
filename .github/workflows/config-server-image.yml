name: Config Server Image

on:
  pull_request:
    paths:
      - 'backend/services/config-server/**'
      - 'backend/build.gradle'
      - 'backend/settings.gradle'
      - 'backend/gradle.properties'
      - 'backend/gradlew'
      - 'backend/gradlew.bat'
      - 'backend/gradle/**'
      - '.github/workflows/config-server-image.yml'
  push:
    branches:
      - main
    paths:
      - 'backend/services/config-server/**'
      - 'backend/build.gradle'
      - 'backend/settings.gradle'
      - 'backend/gradle.properties'
      - 'backend/gradlew'
      - 'backend/gradlew.bat'
      - 'backend/gradle/**'
      - '.github/workflows/config-server-image.yml'
  workflow_dispatch:

concurrency:
  group: config-server-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/lastdish-config-server

jobs:
  test-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
          cache-dependency-path: backend/**/*.gradle*

      - name: Test Config Server
        working-directory: backend
        run: ./gradlew :services:config-server:test --no-daemon

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: metadata
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=dev,enable=${{ github.event_name != 'pull_request' }}
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: backend
          file: backend/services/config-server/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha,scope=config-server
          cache-to: type=gha,mode=max,scope=config-server
