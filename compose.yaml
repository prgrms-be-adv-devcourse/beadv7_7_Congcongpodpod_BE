name: lastdish-local

services:
  member-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: member_db
      POSTGRES_USER: member
      POSTGRES_PASSWORD: member_local_password
    ports:
      - "54321:5432"
    volumes:
      - member-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U member -d member_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  core-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: core_db
      POSTGRES_USER: core
      POSTGRES_PASSWORD: core_local_password
    ports:
      - "54322:5432"
    volumes:
      - core-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U core -d core_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  config-server:
    build:
      context: ./backend
      dockerfile: services/config-server/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: native
      CONFIG_NATIVE_SEARCH_LOCATIONS: file:/config
    volumes:
      - ./infra/local/config:/config:ro
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8888/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  member-service:
    build:
      context: ./backend
      dockerfile: services/member-service/Dockerfile
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      MEMBER_DB_URL: jdbc:postgresql://member-db:5432/member_db
      MEMBER_DB_USERNAME: member
      MEMBER_DB_PASSWORD: member_local_password
    depends_on:
      config-server:
        condition: service_healthy
      member-db:
        condition: service_healthy
    ports:
      - "8081:8080"

  core-service:
    build:
      context: ./backend
      dockerfile: services/core-service/Dockerfile
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      CORE_DB_URL: jdbc:postgresql://core-db:5432/core_db
      CORE_DB_USERNAME: core
      CORE_DB_PASSWORD: core_local_password
    depends_on:
      config-server:
        condition: service_healthy
      core-db:
        condition: service_healthy
    ports:
      - "8082:8080"

  gateway-service:
    build:
      context: ./backend
      dockerfile: services/gateway-service/Dockerfile
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
    depends_on:
      config-server:
        condition: service_healthy
      member-service:
        condition: service_started
      core-service:
        condition: service_started
    ports:
      - "8080:8080"

volumes:
  member-db-data:
  core-db-data:
