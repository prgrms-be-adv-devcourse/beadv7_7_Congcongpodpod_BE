spring:
  application:
    name: gateway-service
  cloud:
    config:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,refresh
  endpoint:
    gateway:
      access: unrestricted

gateway:
  security:
    jwt:
      issuer: lastdish-member-service
      public-key-location: classpath:keys/test-public-key.pem
