spring:
  application:
    name: member-service
  cloud:
    config:
      enabled: false
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    show-sql: true

jwt:
  rsa:
    access-private-key-location: classpath:keys/test-private-key.pem
    access-public-key-location: classpath:keys/test-public-key.pem
  access-token-validity-in-seconds: 3600
  refresh-token-validity-in-seconds: 1209600

member:
  message: "Hello from test config"

management:
  endpoints:
    web:
      exposure:
        include: refresh, health, info
  endpoint:
    refresh:
      enabled: true